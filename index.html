<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SillyTavern 表格数据无损升级工具</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #282a36;
            --text-color: #f8f8f2;
            --primary-color: #bd93f9;
            --primary-hover: #ff79c6;
            --secondary-color: #8be9fd;
            --success-color: #50fa7b;
            --error-color: #ff5555;
            --border-radius: 8px;
            --input-bg: #44475a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--primary-color);
            text-align: center;
        }

        p.desc {
            font-size: 0.9rem;
            color: #b9b9b9;
            line-height: 1.5;
            margin-bottom: 20px;
            text-align: center;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 左侧：数据上传区 */
        .upload-area {
            border: 2px dashed #6272a4;
            border-radius: var(--border-radius);
            padding: 30px 15px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            background-color: rgba(98, 114, 164, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .upload-area:hover {
            border-color: var(--primary-hover);
            background-color: rgba(98, 114, 164, 0.2);
        }

        .upload-area.active {
            border-color: var(--success-color);
            border-style: solid;
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 1;
        }

        .upload-title {
            font-weight: bold;
            color: var(--secondary-color);
            margin-bottom: 10px;
            font-size: 1.1rem;
            pointer-events: none;
        }

        .upload-text {
            font-size: 0.85rem;
            color: #888;
            pointer-events: none;
            word-break: break-all;
            min-height: 40px;
        }

        /* 右侧：模板库控制面板 */
        .template-panel {
            border: 2px solid #6272a4;
            border-radius: var(--border-radius);
            padding: 20px 15px;
            background-color: rgba(98, 114, 164, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .template-panel .upload-title {
            text-align: center;
            margin-bottom: 15px;
        }

        select {
            width: 100%;
            padding: 10px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid #6272a4;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            outline: none;
            cursor: pointer;
        }
        
        select:focus { border-color: var(--primary-color); }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-upload { background-color: #50fa7b; color: #282a36; }
        .btn-upload:hover { background-color: #69ff94; }
        
        .btn-delete { background-color: transparent; color: var(--error-color); border: 1px solid var(--error-color); }
        .btn-delete:hover { background-color: var(--error-color); color: #fff; }
        .btn-delete:disabled { border-color: #6272a4; color: #6272a4; cursor: not-allowed; background: transparent; }

        /* 底部大按钮 */
        .main-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #282a36;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .main-btn:hover { background-color: var(--primary-hover); }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { background-color: var(--input-bg); color: #6272a4; cursor: not-allowed; transform: none; }

        #logArea {
            margin-top: 20px;
            background-color: #191a21;
            padding: 15px;
            border-radius: var(--border-radius);
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid var(--input-bg);
        }

        .log-info { color: #f1fa8c; }
        .log-success { color: var(--success-color); }
        .log-error { color: var(--error-color); }
        .log-warn { color: #ffb86c; }
        
        @media (max-width: 600px) {
            .upload-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>表格数据无损升级工具</h1>
    <p class="desc">
        左侧放入 <code>table_data.json</code>，右侧选择模板，一键注入新结构。<br>
        <span style="color: var(--success-color);">✨ 模板库已激活：一次上传，永久保存在本地，随用随切！</span>
    </p>

    <div class="upload-grid">
        <!-- 左侧：传旧数据 -->
        <div class="upload-area" id="areaData">
            <input type="file" id="fileData" accept=".json">
            <div class="upload-title">1. 上传旧表格数据</div>
            <div class="upload-text" id="textData">拖拽或点击上传<br><span>table_data.json</span></div>
        </div>

        <!-- 右侧：模板库 -->
        <div class="template-panel">
            <div class="upload-title">2. 选择表格结构模板</div>
            <select id="templateSelect">
                <option value="">-- 请先上传模板 --</option>
            </select>
            
            <div class="action-btns">
                <button id="btnUploadTpl" class="btn-small btn-upload">➕ 新增模板</button>
                <button id="btnDeleteTpl" class="btn-small btn-delete" disabled>🗑️ 删除选中</button>
            </div>
            <!-- 隐藏的模板上传框 -->
            <input type="file" id="fileConfig" accept=".json" style="display:none;">
        </div>
    </div>

    <button id="convertBtn" class="main-btn" disabled>合并并下载新 table_data.json</button>

    <div id="logArea"></div>
</div>

<script>
    // DOM 元素
    const fileData = document.getElementById('fileData');
    const fileConfig = document.getElementById('fileConfig');
    const textData = document.getElementById('textData');
    const areaData = document.getElementById('areaData');
    const templateSelect = document.getElementById('templateSelect');
    const btnUploadTpl = document.getElementById('btnUploadTpl');
    const btnDeleteTpl = document.getElementById('btnDeleteTpl');
    const convertBtn = document.getElementById('convertBtn');
    const logArea = document.getElementById('logArea');

    // 数据状态
    let jsonObj_Data = null;
    let templateLibrary = []; // 存储所有模板 [{id, name, data}]
    let currentTemplateId = null;

    const STORAGE_KEY_LIB = 'st_template_library_v2';
    const STORAGE_KEY_LAST_ID = 'st_last_template_id';

    // -- 核心逻辑：日志 --
    function log(message, type = 'info') {
        const span = document.createElement('span');
        span.className = `log-${type}`;
        span.textContent = message + '\n';
        logArea.appendChild(span);
        logArea.scrollTop = logArea.scrollHeight;
    }

    // -- 核心逻辑：状态检查 --
    function checkReady() {
        const hasData = jsonObj_Data !== null;
        const hasTemplate = currentTemplateId !== null && currentTemplateId !== "";
        
        btnDeleteTpl.disabled = !hasTemplate;

        if (hasData && hasTemplate) {
            convertBtn.disabled = false;
            if(!convertBtn.dataset.readyLogged) {
                log('✅ 数据和模板均已就绪，可以开始合并。', 'success');
                convertBtn.dataset.readyLogged = "true";
            }
        } else {
            convertBtn.disabled = true;
            convertBtn.dataset.readyLogged = "";
        }
    }

    // -- 模板库管理：加载与渲染 --
    function loadTemplateLibrary() {
        const savedLib = localStorage.getItem(STORAGE_KEY_LIB);
        const lastId = localStorage.getItem(STORAGE_KEY_LAST_ID);

        if (savedLib) {
            try {
                templateLibrary = JSON.parse(savedLib);
            } catch (e) {
                templateLibrary = [];
            }
        }

        renderSelect(lastId);
        log(`[系统] 模板库加载完成，共 ${templateLibrary.length} 个模板。`, 'info');
    }

    function saveTemplateLibrary() {
        localStorage.setItem(STORAGE_KEY_LIB, JSON.stringify(templateLibrary));
        if (currentTemplateId) {
            localStorage.setItem(STORAGE_KEY_LAST_ID, currentTemplateId);
        } else {
            localStorage.removeItem(STORAGE_KEY_LAST_ID);
        }
    }

    function renderSelect(targetId = null) {
        templateSelect.innerHTML = '';
        
        if (templateLibrary.length === 0) {
            const opt = document.createElement('option');
            opt.value = "";
            opt.textContent = "-- 请先上传模板 --";
            templateSelect.appendChild(opt);
            currentTemplateId = null;
        } else {
            templateLibrary.forEach(tpl => {
                const opt = document.createElement('option');
                opt.value = tpl.id;
                opt.textContent = tpl.name;
                templateSelect.appendChild(opt);
            });
            
            // 尝试选中目标 ID
            if (targetId && templateLibrary.some(t => t.id === targetId)) {
                templateSelect.value = targetId;
                currentTemplateId = targetId;
            } else {
                templateSelect.value = templateLibrary[0].id;
                currentTemplateId = templateLibrary[0].id;
            }
        }
        checkReady();
    }

    // -- 交互事件：模板库操作 --
    templateSelect.addEventListener('change', (e) => {
        currentTemplateId = e.target.value;
        saveTemplateLibrary();
        checkReady();
        if(currentTemplateId) {
            const tplName = templateSelect.options[templateSelect.selectedIndex].text;
            log(`已切换至模板: [${tplName}]`, 'info');
        }
    });

    btnUploadTpl.addEventListener('click', () => {
        fileConfig.click(); // 触发隐藏的文件上传
    });

    btnDeleteTpl.addEventListener('click', () => {
        if (!currentTemplateId) return;
        const tplName = templateSelect.options[templateSelect.selectedIndex].text;
        if (confirm(`确定要删除模板 "${tplName}" 吗？`)) {
            templateLibrary = templateLibrary.filter(t => t.id !== currentTemplateId);
            saveTemplateLibrary();
            renderSelect();
            log(`🗑️ 已删除模板: [${tplName}]`, 'warn');
        }
    });

    // -- 文件解析逻辑 --
    fileData.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                let parsed = JSON.parse(e.target.result.replace(/^\uFEFF/, ''));
                if (!Object.keys(parsed).some(k => k.startsWith('sheet_'))) {
                    throw new Error("未检测到 sheet_ 字段，这不是正确的 table_data.json");
                }
                jsonObj_Data = parsed;
                textData.innerHTML = `<span style="color:var(--success-color)">已加载:<br>${file.name}</span>`;
                areaData.classList.add('active');
                log(`成功读取旧数据文件: ${file.name}`, 'success');
                checkReady();
            } catch (error) {
                log(`解析数据失败: ${error.message}`, 'error');
                jsonObj_Data = null;
                areaData.classList.remove('active');
                checkReady();
            }
        };
        reader.readAsText(file);
    });

    fileConfig.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                let parsed = JSON.parse(e.target.result.replace(/^\uFEFF/, ''));
                if (!parsed.tableStructure || !Array.isArray(parsed.tableStructure)) {
                    throw new Error("未检测到 tableStructure，这不是正确的 tableCustomConfig.json");
                }
                
                // 提示用户输入模板名称
                let defaultName = file.name.replace('.json', '');
                let customName = prompt("为这个结构模板起个名字吧（方便以后选择）：", defaultName);
                if (customName === null) {
                    fileConfig.value = ''; // 用户取消
                    return; 
                }
                customName = customName.trim() || defaultName;

                // 构建模板对象并存入库
                const newTpl = {
                    id: 'tpl_' + Date.now(),
                    name: customName,
                    data: parsed
                };
                
                templateLibrary.push(newTpl);
                saveTemplateLibrary();
                renderSelect(newTpl.id); // 渲染并选中新模板
                
                log(`✨ 成功保存新模板: [${customName}]`, 'success');
                fileConfig.value = ''; // 清空 input 以便重复上传同名文件
            } catch (error) {
                log(`解析模板失败: ${error.message}`, 'error');
                fileConfig.value = '';
            }
        };
        reader.readAsText(file);
    });

    // -- 核心合并逻辑 --
    convertBtn.addEventListener('click', () => {
        if (!jsonObj_Data || !currentTemplateId) return;

        const selectedTpl = templateLibrary.find(t => t.id === currentTemplateId);
        if (!selectedTpl) {
            log('错误：未找到选中的模板数据！', 'error');
            return;
        }

        log(`\n--- 开始使用模板 [${selectedTpl.name}] 进行合并 ---`, 'info');
        
        try {
            const structureMap = {};
            selectedTpl.data.tableStructure.forEach(struct => {
                if (struct.tableName) structureMap[struct.tableName] = struct;
            });

            let processedCount = 0;
            let clonedData = JSON.parse(JSON.stringify(jsonObj_Data));

            for (let key in clonedData) {
                let sheet = clonedData[key];
                if (sheet && typeof sheet === 'object' && sheet.name && sheet.sourceData) {
                    let sheetName = sheet.name;
                    let newStruct = structureMap[sheetName];

                    if (newStruct) {
                        sheet.sourceData.note = newStruct.note || sheet.sourceData.note;
                        sheet.sourceData.initNode = newStruct.initNode || sheet.sourceData.initNode;
                        sheet.sourceData.deleteNode = newStruct.deleteNode || sheet.sourceData.deleteNode;
                        sheet.sourceData.updateNode = newStruct.updateNode || sheet.sourceData.updateNode;
                        sheet.sourceData.insertNode = newStruct.insertNode || sheet.sourceData.insertNode;
                        
                        if (newStruct.config) sheet.config = newStruct.config;

                        processedCount++;
                        log(`[成功] 表格 "${sheetName}" 结构已更新。`, 'success');
                    } else {
                        log(`[跳过] 表格 "${sheetName}" 在模板中未找到对应规则。`, 'warn');
                    }
                }
            }

            log(`\n🎉 合并完成！共升级了 ${processedCount} 个表格。准备下载...`, 'success');

            const blob = new Blob([JSON.stringify(clonedData, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            a.download = `table_data_Merged_${timestamp}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            log('新文件已触发下载！请将其导入酒馆。', 'success');

        } catch (error) {
            log(`合并过程中发生严重错误: ${error.message}`, 'error');
        }
    });

    // 初始化
    window.onload = loadTemplateLibrary;
</script>

</body>
</html>
