<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SillyTavern 表格数据无损升级工具</title>
    <style>
        /* ================= 主题变量定义 ================= */
        /* 默认：深色模式 (Dracula 风格) */
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #282a36;
            --text-color: #f8f8f2;
            --text-muted: #b9b9b9;
            --primary-color: #bd93f9;
            --primary-hover: #ff79c6;
            --secondary-color: #8be9fd;
            --border-color: #6272a4;
            --input-bg: #44475a;
            --upload-bg: rgba(98, 114, 164, 0.1);
            --upload-hover-bg: rgba(98, 114, 164, 0.2);
            --btn-text-color: #282a36;
            
            /* 日志颜色 (深色底) */
            --log-bg: #191a21;
            --log-info: #f1fa8c;
            --log-success: #50fa7b;
            --log-error: #ff5555;
            --log-warn: #ffb86c;
        }

        /* 浅色模式 (奶黄 + 66ccff 风格) */
        [data-theme="light"] {
            --bg-color: #FFFDF0; /* 浅奶黄色 */
            --panel-bg: #FFFFFF; /* 纯白面板 */
            --text-color: #4A5568; /* 深灰蓝字体，保证阅读性 */
            --text-muted: #718096;
            --primary-color: #66ccff; /* 低饱和度蓝 */
            --primary-hover: #4db8ff;
            --secondary-color: #5ea8d9;
            --border-color: #cce8ff;
            --input-bg: #f4f9fd;
            --upload-bg: rgba(102, 204, 255, 0.05);
            --upload-hover-bg: rgba(102, 204, 255, 0.15);
            --btn-text-color: #FFFFFF; /* 蓝色按钮配白字 */
            
            /* 日志颜色 (浅色底) */
            --log-bg: #f8fbfe;
            --log-info: #007bb5;
            --log-success: #27ae60;
            --log-error: #e74c3c;
            --log-warn: #d35400;
        }

        /* ================= 全局样式 ================= */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            max-width: 800px;
            width: 100%;
            position: relative;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* 浅色模式下的阴影调整 */
        [data-theme="light"] .container {
            box-shadow: 0 10px 40px rgba(102, 204, 255, 0.15);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: transform 0.3s ease;
            color: var(--text-color);
        }
        .theme-toggle:hover { transform: scale(1.1) rotate(15deg); }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--primary-color);
            text-align: center;
            padding-top: 10px;
        }

        p.desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 25px;
            text-align: center;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 左侧：数据上传区 */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 35px 15px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            background-color: var(--upload-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .upload-area:hover {
            border-color: var(--primary-hover);
            background-color: var(--upload-hover-bg);
        }

        .upload-area.active {
            border-color: var(--log-success);
            border-style: solid;
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 1;
        }

        .upload-title {
            font-weight: bold;
            color: var(--secondary-color);
            margin-bottom: 10px;
            font-size: 1.1rem;
            pointer-events: none;
        }

        .upload-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            pointer-events: none;
            word-break: break-all;
            min-height: 40px;
        }

        /* 右侧：模板库控制面板 */
        .template-panel {
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 20px 15px;
            background-color: var(--upload-bg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .template-panel .upload-title {
            text-align: center;
            margin-bottom: 15px;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 15px;
            outline: none;
            cursor: pointer;
            appearance: none; /* 移除原生箭头 */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1em;
        }
        
        select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(102, 204, 255, 0.3); }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-upload { background-color: var(--primary-color); color: var(--btn-text-color); }
        .btn-upload:hover { background-color: var(--primary-hover); }
        
        .btn-delete { background-color: transparent; color: var(--log-error); border: 1px solid var(--log-error); }
        .btn-delete:hover { background-color: var(--log-error); color: #fff; }
        .btn-delete:disabled { border-color: var(--border-color); color: var(--text-muted); cursor: not-allowed; background: transparent; }

        /* 底部大按钮 */
        .main-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: var(--btn-text-color);
            border: none;
            border-radius: 10px;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 204, 255, 0.3);
        }

        .main-btn:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { 
            background-color: var(--input-bg); 
            color: var(--text-muted); 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none;
        }

        /* 日志区域 */
        #logArea {
            margin-top: 20px;
            background-color: var(--log-bg);
            padding: 15px;
            border-radius: 10px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.85rem;
            height: 180px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid var(--border-color);
            line-height: 1.5;
        }

        .log-info { color: var(--log-info); }
        .log-success { color: var(--log-success); }
        .log-error { color: var(--log-error); }
        .log-warn { color: var(--log-warn); }
        
        /* ================= 移动端深度适配 ================= */
        @media (max-width: 650px) {
            body { padding: 10px; }
            .container { padding: 20px 15px; }
            .upload-grid { grid-template-columns: 1fr; gap: 15px; }
            h1 { font-size: 1.3rem; margin-top: 10px; }
            .theme-toggle { top: 15px; right: 15px; font-size: 1.3rem; }
            .upload-area { padding: 25px 10px; }
            .action-btns { flex-direction: column; } /* 手机上按钮垂直排列防误触 */
            .btn-small { padding: 12px; font-size: 1rem; }
            .main-btn { padding: 14px; font-size: 1.1rem; }
            #logArea { height: 150px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
    
    <h1>表格数据无损升级工具</h1>
    <p class="desc">
        左侧放入 <code>table_data.json</code>，右侧选择模板，一键注入新结构。<br>
        <span style="color: var(--log-success); font-weight: bold;">✨ 模板库：一次上传，永久保存在本地，随用随切！</span>
    </p>

    <div class="upload-grid">
        <!-- 左侧：传旧数据 -->
        <div class="upload-area" id="areaData">
            <input type="file" id="fileData" accept=".json">
            <div class="upload-title">1. 上传旧表格数据</div>
            <div class="upload-text" id="textData">拖拽或点击上传<br><span>table_data.json</span></div>
        </div>

        <!-- 右侧：模板库 -->
        <div class="template-panel">
            <div class="upload-title">2. 选择表格结构模板</div>
            <select id="templateSelect">
                <option value="">-- 请先上传模板 --</option>
            </select>
            
            <div class="action-btns">
                <button id="btnUploadTpl" class="btn-small btn-upload">➕ 新增模板</button>
                <button id="btnDeleteTpl" class="btn-small btn-delete" disabled>🗑️ 删除选中</button>
            </div>
            <input type="file" id="fileConfig" accept=".json" style="display:none;">
        </div>
    </div>

    <button id="convertBtn" class="main-btn" disabled>合并并下载新 table_data.json</button>

    <div id="logArea"></div>
</div>

<script>
    // ================= 主题切换逻辑 =================
    const themeToggle = document.getElementById('themeToggle');
    const currentTheme = localStorage.getItem('st_theme') || 'dark';

    function setTheme(theme) {
        if (theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            themeToggle.textContent = '☀️';
            localStorage.setItem('st_theme', 'light');
        } else {
            document.documentElement.removeAttribute('data-theme');
            themeToggle.textContent = '🌙';
            localStorage.setItem('st_theme', 'dark');
        }
    }

    // 初始化主题
    setTheme(currentTheme);

    themeToggle.addEventListener('click', () => {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        setTheme(isLight ? 'dark' : 'light');
    });

    // ================= 核心业务逻辑 =================
    const fileData = document.getElementById('fileData');
    const fileConfig = document.getElementById('fileConfig');
    const textData = document.getElementById('textData');
    const areaData = document.getElementById('areaData');
    const templateSelect = document.getElementById('templateSelect');
    const btnUploadTpl = document.getElementById('btnUploadTpl');
    const btnDeleteTpl = document.getElementById('btnDeleteTpl');
    const convertBtn = document.getElementById('convertBtn');
    const logArea = document.getElementById('logArea');

    let jsonObj_Data = null;
    let templateLibrary = [];
    let currentTemplateId = null;

    const STORAGE_KEY_LIB = 'st_template_library_v2';
    const STORAGE_KEY_LAST_ID = 'st_last_template_id';

    function log(message, type = 'info') {
        const span = document.createElement('span');
        span.className = `log-${type}`;
        span.textContent = message + '\n';
        logArea.appendChild(span);
        logArea.scrollTop = logArea.scrollHeight;
    }

    function checkReady() {
        const hasData = jsonObj_Data !== null;
        const hasTemplate = currentTemplateId !== null && currentTemplateId !== "";
        
        btnDeleteTpl.disabled = !hasTemplate;

        if (hasData && hasTemplate) {
            convertBtn.disabled = false;
            if(!convertBtn.dataset.readyLogged) {
                log('✅ 数据和模板均已就绪，可以开始合并。', 'success');
                convertBtn.dataset.readyLogged = "true";
            }
        } else {
            convertBtn.disabled = true;
            convertBtn.dataset.readyLogged = "";
        }
    }

    function loadTemplateLibrary() {
        const savedLib = localStorage.getItem(STORAGE_KEY_LIB);
        const lastId = localStorage.getItem(STORAGE_KEY_LAST_ID);

        if (savedLib) {
            try { templateLibrary = JSON.parse(savedLib); } 
            catch (e) { templateLibrary = []; }
        }

        renderSelect(lastId);
        log(`[系统] 模板库加载完成，共 ${templateLibrary.length} 个模板。`, 'info');
    }

    function saveTemplateLibrary() {
        localStorage.setItem(STORAGE_KEY_LIB, JSON.stringify(templateLibrary));
        if (currentTemplateId) localStorage.setItem(STORAGE_KEY_LAST_ID, currentTemplateId);
        else localStorage.removeItem(STORAGE_KEY_LAST_ID);
    }

    function renderSelect(targetId = null) {
        templateSelect.innerHTML = '';
        
        if (templateLibrary.length === 0) {
            const opt = document.createElement('option');
            opt.value = "";
            opt.textContent = "-- 请先上传模板 --";
            templateSelect.appendChild(opt);
            currentTemplateId = null;
        } else {
            templateLibrary.forEach(tpl => {
                const opt = document.createElement('option');
                opt.value = tpl.id;
                opt.textContent = tpl.name;
                templateSelect.appendChild(opt);
            });
            
            if (targetId && templateLibrary.some(t => t.id === targetId)) {
                templateSelect.value = targetId;
                currentTemplateId = targetId;
            } else {
                templateSelect.value = templateLibrary[0].id;
                currentTemplateId = templateLibrary[0].id;
            }
        }
        checkReady();
    }

    templateSelect.addEventListener('change', (e) => {
        currentTemplateId = e.target.value;
        saveTemplateLibrary();
        checkReady();
        if(currentTemplateId) {
            const tplName = templateSelect.options[templateSelect.selectedIndex].text;
            log(`已切换至模板: [${tplName}]`, 'info');
        }
    });

    btnUploadTpl.addEventListener('click', () => fileConfig.click());

    btnDeleteTpl.addEventListener('click', () => {
        if (!currentTemplateId) return;
        const tplName = templateSelect.options[templateSelect.selectedIndex].text;
        if (confirm(`确定要删除模板 "${tplName}" 吗？`)) {
            templateLibrary = templateLibrary.filter(t => t.id !== currentTemplateId);
            saveTemplateLibrary();
            renderSelect();
            log(`🗑️ 已删除模板: [${tplName}]`, 'warn');
        }
    });

    fileData.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                let parsed = JSON.parse(e.target.result.replace(/^\uFEFF/, ''));
                if (!Object.keys(parsed).some(k => k.startsWith('sheet_'))) {
                    throw new Error("未检测到 sheet_ 字段，这不是正确的 table_data.json");
                }
                jsonObj_Data = parsed;
                textData.innerHTML = `<span style="color:var(--log-success); font-weight:bold;">已加载:<br>${file.name}</span>`;
                areaData.classList.add('active');
                log(`成功读取旧数据文件: ${file.name}`, 'success');
                checkReady();
            } catch (error) {
                log(`解析数据失败: ${error.message}`, 'error');
                jsonObj_Data = null;
                areaData.classList.remove('active');
                checkReady();
            }
        };
        reader.readAsText(file);
    });

    fileConfig.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                let parsed = JSON.parse(e.target.result.replace(/^\uFEFF/, ''));
                if (!parsed.tableStructure || !Array.isArray(parsed.tableStructure)) {
                    throw new Error("未检测到 tableStructure，这不是正确的 tableCustomConfig.json");
                }
                
                let defaultName = file.name.replace('.json', '');
                let customName = prompt("为这个结构模板起个名字吧（方便以后选择）：", defaultName);
                if (customName === null) { fileConfig.value = ''; return; }
                customName = customName.trim() || defaultName;

                const newTpl = { id: 'tpl_' + Date.now(), name: customName, data: parsed };
                templateLibrary.push(newTpl);
                saveTemplateLibrary();
                renderSelect(newTpl.id);
                log(`✨ 成功保存新模板: [${customName}]`, 'success');
                fileConfig.value = ''; 
            } catch (error) {
                log(`解析模板失败: ${error.message}`, 'error');
                fileConfig.value = '';
            }
        };
        reader.readAsText(file);
    });

    convertBtn.addEventListener('click', () => {
        if (!jsonObj_Data || !currentTemplateId) return;
        const selectedTpl = templateLibrary.find(t => t.id === currentTemplateId);
        if (!selectedTpl) return log('错误：未找到选中的模板数据！', 'error');

        log(`\n--- 开始使用模板 [${selectedTpl.name}] 进行合并 ---`, 'info');
        
        try {
            const structureMap = {};
            selectedTpl.data.tableStructure.forEach(struct => {
                if (struct.tableName) structureMap[struct.tableName] = struct;
            });

            let processedCount = 0;
            let clonedData = JSON.parse(JSON.stringify(jsonObj_Data));

            for (let key in clonedData) {
                let sheet = clonedData[key];
                if (sheet && typeof sheet === 'object' && sheet.name && sheet.sourceData) {
                    let sheetName = sheet.name;
                    let newStruct = structureMap[sheetName];

                    if (newStruct) {
                        sheet.sourceData.note = newStruct.note || sheet.sourceData.note;
                        sheet.sourceData.initNode = newStruct.initNode || sheet.sourceData.initNode;
                        sheet.sourceData.deleteNode = newStruct.deleteNode || sheet.sourceData.deleteNode;
                        sheet.sourceData.updateNode = newStruct.updateNode || sheet.sourceData.updateNode;
                        sheet.sourceData.insertNode = newStruct.insertNode || sheet.sourceData.insertNode;
                        if (newStruct.config) sheet.config = newStruct.config;

                        processedCount++;
                        log(`[成功] 表格 "${sheetName}" 结构已更新。`, 'success');
                    } else {
                        log(`[跳过] 表格 "${sheetName}" 在模板中未找到对应规则。`, 'warn');
                    }
                }
            }

            log(`\n🎉 合并完成！共升级了 ${processedCount} 个表格。准备下载...`, 'success');

            const blob = new Blob([JSON.stringify(clonedData, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            a.download = `table_data_Merged_${timestamp}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            log('新文件已触发下载！请将其导入酒馆。', 'success');

        } catch (error) {
            log(`合并过程中发生严重错误: ${error.message}`, 'error');
        }
    });

    window.onload = loadTemplateLibrary;
</script>

</body>
</html>
